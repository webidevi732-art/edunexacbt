<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EduNexa CBT - Siswa</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#070D1A;--bg2:#0D1526;--card:#131D33;--brd:#1C2E4A;--p:#0C8CE9;--pd:#065FB3;--pl:#3DB8F5;--pa:#06D6A0;--txt:#EDF2F7;--txt2:#A0AEC0;--mut:#5A6B82;--dng:#EF4444;--wrn:#F59E0B;--suc:#06D6A0;--r:8px;--sh:0 4px 20px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 20%,rgba(12,140,233,.15),transparent 60%),var(--bg)}
.lg-card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lg-card .logo{text-align:center;margin-bottom:24px}
.lg-card .logo i{font-size:36px;color:var(--p);margin-bottom:8px;display:block}
.lg-card .logo h1{font-size:22px;font-weight:900;background:linear-gradient(90deg,var(--p),var(--pa));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lg-card .logo p{font-size:11px;color:var(--mut);margin-top:4px}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fi label{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.fi input,.fi select{padding:10px 14px;border:1px solid var(--brd);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--txt);background:var(--bg2);transition:.2s}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(12,140,233,.15)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 24px;border:none;border-radius:var(--r);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;width:100%}
.bp{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff}.bp:hover{box-shadow:0 4px 20px rgba(12,140,233,.4);transform:translateY(-1px)}
.bp:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.lg-err{font-size:11px;color:var(--dng);margin-top:8px;text-align:center;min-height:16px}
#examPage{display:none;height:100vh;flex-direction:column}
.ex-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0;gap:8px;flex-wrap:wrap}
.ex-top .tn{font-size:13px;font-weight:800;color:var(--pl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%}
.ex-top .ti-wrap{display:flex;align-items:center;gap:8px}
.ex-top .timer{font-family:monospace;font-size:18px;font-weight:800;color:var(--pa);background:rgba(6,214,160,.08);padding:5px 14px;border-radius:var(--r);border:1px solid rgba(6,214,160,.2);white-space:nowrap}
.ex-top .timer.wr{color:var(--dng);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);animation:pls 1s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.5}}
.ex-top .vi{display:none;align-items:center;gap:5px;font-size:10px;color:var(--wrn);background:rgba(245,158,11,.1);padding:3px 10px;border-radius:20px;border:1px solid rgba(245,158,11,.2);white-space:nowrap}
.ex-top .vi.sh{display:flex}
.ex-body{display:grid;grid-template-columns:260px 1fr 72px;flex:1;overflow:hidden}
.nar-panel{border-right:1px solid var(--brd);overflow-y:auto;padding:14px;background:var(--bg2)}
.nar-panel .npt{font-size:9px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.nar-panel .nrc{font-size:12.5px;line-height:1.7;color:var(--txt2);margin-bottom:10px}
.nar-panel .nrc img{max-width:100%;border-radius:6px;margin-top:6px}
.nar-empty{text-align:center;padding:30px 14px;color:var(--mut);font-size:11px}
.nar-empty i{font-size:28px;opacity:.3;display:block;margin-bottom:6px}
.soal-panel{overflow-y:auto;padding:20px 24px}
.soal-panel .q-model{display:inline-block;font-size:9px;font-weight:700;color:var(--pl);background:rgba(12,140,233,.12);padding:2px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px}
.soal-panel .q-num{font-size:11px;font-weight:700;color:var(--p);margin-bottom:4px}
.soal-panel .q-text{font-size:14px;line-height:1.7;margin-bottom:14px;color:var(--txt)}
.soal-panel .q-text img{max-width:100%;border-radius:6px;margin-top:6px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:.2s;background:var(--card)}
.opt:hover{border-color:rgba(12,140,233,.4);background:rgba(12,140,233,.04)}
.opt.sel{border-color:var(--p);background:rgba(12,140,233,.12);box-shadow:0 0 0 2px rgba(12,140,233,.15)}
.opt input[type=radio],.opt input[type=checkbox]{display:none}
.opt .ol{width:26px;height:26px;border-radius:50%;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mut);flex-shrink:0;transition:.2s}
.opt.sel .ol{border-color:var(--p);color:var(--p);background:rgba(12,140,233,.15)}
.opt .oc{flex:1;display:flex;flex-direction:column;gap:4px}
.opt .ot{font-size:12.5px;line-height:1.5;color:var(--txt2)}
.opt .oi{max-width:200px;max-height:120px;border-radius:6px;border:1px solid var(--brd);object-fit:contain}
.bs-tbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:12.5px}
.bs-tbl thead th{background:rgba(12,140,233,.15);color:var(--pl);font-weight:700;padding:9px 10px;text-align:left;border:1px solid var(--brd);font-size:11px}
.bs-tbl tbody td{padding:9px 10px;border:1px solid var(--brd);color:var(--txt2);vertical-align:middle}
.bs-tbl tbody tr:hover{background:rgba(12,140,233,.03)}
.bs-tbl input[type=radio]{width:16px;height:16px;accent-color:var(--p);cursor:pointer}
.ex-nav{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--bg2);border-top:1px solid var(--brd);flex-shrink:0;gap:8px}
.nb{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border:1px solid var(--brd);border-radius:var(--r);background:var(--card);color:var(--txt2);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s}
.nb:hover{border-color:var(--p);color:var(--pl)}
.nb.pri{background:linear-gradient(135deg,var(--p),var(--pd));border-color:transparent;color:#fff}
.nb.pri:hover{box-shadow:0 4px 12px rgba(12,140,233,.3)}
.nb.dgr{background:var(--dng);border-color:transparent;color:#fff}
.nb.dgr:hover{background:#DC2626}
.nom-panel{border-left:1px solid var(--brd);overflow-y:auto;padding:8px 6px;background:var(--bg2);display:flex;flex-direction:column;gap:3px;align-items:center}
.nom-panel .npt2{font-size:8px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:2px}
.nmb{width:100%;max-width:56px;aspect-ratio:1;border:1px solid var(--brd);border-radius:5px;background:var(--card);color:var(--mut);font-size:11px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.nmb:hover{border-color:var(--p);color:var(--pl)}
.nmb.cur{border-color:var(--p);background:rgba(12,140,233,.2);color:#fff;font-weight:800}
.nmb.ans{border-color:var(--dng);background:rgba(239,68,68,.15);color:var(--dng)}
.nmb.cur.ans{border-color:var(--dng);background:rgba(239,68,68,.25);color:#fff}
.co{position:fixed;inset:0;background:rgba(7,13,26,.97);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:20px}
.co.sh{display:flex}
.co i{font-size:44px;color:var(--dng);animation:pls 1s infinite}
.co h2{font-size:20px;font-weight:800;color:var(--dng)}
.co p{font-size:12px;color:var(--txt2);max-width:380px;line-height:1.5}
.co .cnt{font-size:36px;font-weight:900;color:var(--wrn);font-family:monospace}
#resultPage{display:none;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 30%,rgba(6,214,160,.1),transparent 60%),var(--bg)}
.res-card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:36px;width:100%;max-width:440px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.res-card .ri{font-size:44px;color:var(--pa);margin-bottom:10px}
.res-card h2{font-size:18px;font-weight:800;color:var(--pl);margin-bottom:4px}
.res-card .rs{font-size:11px;color:var(--mut);margin-bottom:18px}
.res-card .sc-big{font-size:56px;font-weight:900;background:linear-gradient(90deg,var(--p),var(--pa));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.res-card .sc-label{font-size:11px;color:var(--mut);margin-bottom:18px}
.res-card .sts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.res-card .st-item{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:10px}
.res-card .st-v{font-size:20px;font-weight:800;color:var(--pl)}
.res-card .st-l{font-size:9px;color:var(--mut);font-weight:600;text-transform:uppercase;margin-top:2px}
.res-card .st-v.g{color:var(--suc)}.res-card .st-v.r{color:var(--dng)}
@media(max-width:900px){.ex-body{grid-template-columns:1fr 60px}.nar-panel{display:none}}
@media(max-width:600px){.ex-body{grid-template-columns:1fr}.nom-panel{display:none}.soal-panel{padding:16px}}
</style>
</head>
<body>

<div id="loginPage">
<div class="lg-card">
<div class="logo"><i class="fas fa-atom"></i><h1>EduNexa CBT</h1><p>Masukkan token untuk memulai ujian</p></div>
<div class="fi"><label>Token Ujian</label><input id="iToken" placeholder="Contoh: A1B2C3" style="text-transform:uppercase;letter-spacing:2px;font-weight:700;text-align:center;font-size:18px"></div>
<div class="fi"><label>Nama Lengkap</label><input id="iNama" placeholder="Masukkan nama lengkap"></div>
<div class="fi"><label>Sekolah</label><input id="iSekolah" placeholder="Nama sekolah"></div>
<div class="fi"><label>Kelas</label><input id="iKelas" placeholder="Contoh: X IPA 1"></div>
<button class="btn bp" id="btnLogin" onclick="doLogin()"><i class="fas fa-right-to-bracket"></i> Masuk Ujian</button>
<div class="lg-err" id="lgErr"></div>
</div>
</div>

<div id="examPage">
<div class="ex-top">
<div class="tn" id="exNama"></div>
<div class="ti-wrap">
<div class="vi" id="exVi"><i class="fas fa-exclamation-triangle"></i> <span id="exVc">0</span></div>
<div class="timer" id="exTimer">00:00:00</div>
</div>
</div>
<div class="ex-body">
<div class="nar-panel" id="narPanel"><div class="nar-empty"><i class="fas fa-align-left"></i><p>Tidak ada narasi</p></div></div>
<div class="soal-panel" id="soalPanel"><div style="text-align:center;padding:60px;color:var(--mut)"><i class="fas fa-spinner fa-spin" style="font-size:24px;margin-bottom:8px;display:block"></i>Memuat soal...</div></div>
<div class="nom-panel" id="nomPanel"></div>
</div>
<div class="ex-nav">
<button class="nb" onclick="goQ(-1)"><i class="fas fa-chevron-left"></i> Back</button>
<div style="font-size:11px;color:var(--mut)"><span id="exProg">1/1</span> &bull; <span id="exAns">0</span> dijawab</div>
<button class="nb" onclick="goQ(1)">Next <i class="fas fa-chevron-right"></i></button>
<button class="nb pri" onclick="simpanJwb()"><i class="fas fa-floppy-disk"></i> Simpan</button>
<button class="nb dgr" onclick="akhir()"><i class="fas fa-paper-plane"></i> Selesai</button>
</div>
</div>

<div class="co" id="cheatOv">
<i class="fas fa-shield-halved"></i>
<h2>Peringatan!</h2>
<p id="cheatMsg">Deteksi aktivitas mencurigakan.</p>
<div class="cnt" id="cheatCnt">5</div>
</div>

<div id="resultPage">
<div class="res-card">
<div class="ri"><i class="fas fa-trophy"></i></div>
<h2>Ujian Selesai</h2>
<div class="rs" id="resSub"></div>
<div class="sc-big" id="resSkor">0</div>
<div class="sc-label">SKOR ANDA</div>
<div class="sts">
<div class="st-item"><div class="st-v" id="resTot">0</div><div class="st-l">Total Soal</div></div>
<div class="st-item"><div class="st-v g" id="resBen">0</div><div class="st-l">Benar</div></div>
<div class="st-item"><div class="st-v r" id="resSal">0</div><div class="st-l">Salah</div></div>
</div>
<button class="btn bp" onclick="location.reload()" style="margin-top:8px"><i class="fas fa-rotate-right"></i> Kembali</button>
</div>
</div>

<script>
var GAS_URL = localStorage.getItem('edunexa_gas_url') || '';

function cG(fn, d) {
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    return new Promise(function(ok, no) {
      var r = google.script.run.withSuccessHandler(ok).withFailureHandler(no);
      d !== undefined && d !== null ? r[fn](d) : r[fn]();
    });
  }
  if (!GAS_URL) return Promise.reject('No GAS URL');
  return fetch(GAS_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: fn, data: d })
  }).then(function(r) { return r.json(); });
}

/* STATE */
var ST = {
  tes:null, soal:[], narasi:[], jawaban:{},
  curQ:0, durasi:0, sisa:0, tInt:null,
  nama:'', sekolah:'', kelas:'', token:'',
  violations:0, mulai:''
};

/* LOGIN */
document.getElementById('iToken').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('iNama').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

async function doLogin() {
  var tk=document.getElementById('iToken').value.trim().toUpperCase();
  var nm=document.getElementById('iNama').value.trim();
  var sk=document.getElementById('iSekolah').value.trim();
  var kl=document.getElementById('iKelas').value.trim();
  document.getElementById('lgErr').textContent='';
  if(!tk||!nm||!sk||!kl){document.getElementById('lgErr').textContent='Lengkapi semua field';return;}
  document.getElementById('btnLogin').disabled=true;
  document.getElementById('btnLogin').innerHTML='<i class="fas fa-spinner fa-spin"></i> Memverifikasi...';
  try {
    var r=await cG('cekToken',{token:tk});
    if(!r.success){document.getElementById('lgErr').textContent=r.message;document.getElementById('btnLogin').disabled=false;document.getElementById('btnLogin').innerHTML='<i class="fas fa-right-to-bracket"></i> Masuk Ujian';return;}
    ST.tes=r.tes;ST.nama=nm;ST.sekolah=sk;ST.kelas=kl;ST.token=tk;
    ST.durasi=parseInt(r.tes.durasi)*60;ST.sisa=ST.durasi;
    ST.mulai=new Date().toISOString();
    var sr=await cG('getSoalTes',{soalIds:r.soalIds,narasiIds:r.narasiIds});
    ST.soal=sr.soal||[];ST.narasi=sr.narasi||[];
    if(ST.tes.acakSoal) shuffle_(ST.soal);
    startExam();
  } catch(e) {
    document.getElementById('lgErr').textContent='Error: '+e.message;
    document.getElementById('btnLogin').disabled=false;
    document.getElementById('btnLogin').innerHTML='<i class="fas fa-right-to-bracket"></i> Masuk Ujian';
  }
}

function shuffle_(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}

/* START */
function startExam() {
  document.getElementById('loginPage').style.display='none';
  document.getElementById('examPage').style.display='flex';
  document.getElementById('exNama').textContent=ST.tes.namaTes;
  document.getElementById('resultPage').style.display='none';
  buildNoms();buildNarasi();showQ(0);startTimer();initAntiCheat();
}

/* TIMER */
function startTimer() {
  updateTimerDisp();
  ST.tInt=setInterval(function(){
    ST.sisa--;
    if(ST.sisa<=0){clearInterval(ST.tInt);ST.sisa=0;updateTimerDisp();submitExam();return;}
    updateTimerDisp();
  },1000);
}
function updateTimerDisp() {
  var m=Math.floor(ST.sisa/60),s=ST.sisa%60,h=Math.floor(m/60);m=m%60;
  var str=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  var el=document.getElementById('exTimer');el.textContent=str;
  if(ST.sisa<=300)el.classList.add('wr');else el.classList.remove('wr');
}

/* NOMOR */
function buildNoms() {
  var c=document.getElementById('nomPanel'),h='<div class="npt2">Soal</div>';
  for(var i=0;i<ST.soal.length;i++) h+='<button class="nmb" data-i="'+i+'" onclick="showQ('+i+')">'+(i+1)+'</button>';
  c.innerHTML=h;
}
function updateNoms() {
  document.querySelectorAll('.nmb').forEach(function(b){
    var idx=parseInt(b.dataset.i);b.classList.remove('cur','ans');
    if(idx===ST.curQ)b.classList.add('cur');
    if(isAns_(idx))b.classList.add('ans');
  });
  document.getElementById('exProg').textContent=(ST.curQ+1)+'/'+ST.soal.length;
  var cnt=0;ST.soal.forEach(function(_,i){if(isAns_(i))cnt++;});
  document.getElementById('exAns').textContent=cnt;
}
function isAns_(idx) {
  var s=ST.soal[idx],j=ST.jawaban[s.id];
  if(j===undefined||j===null||j===''||j==='{}')return false;
  if(typeof j==='object'&&!Array.isArray(j))return Object.keys(j).length>0;
  if(Array.isArray(j))return j.length>0;
  return true;
}

/* NARASI */
function buildNarasi() {
  var c=document.getElementById('narPanel');
  if(!ST.narasi.length){c.innerHTML='<div class="nar-empty"><i class="fas fa-align-left"></i><p>Tidak ada narasi</p></div>';return;}
  var h='<div class="npt"><i class="fas fa-align-left"></i> Narasi</div>';
  ST.narasi.forEach(function(n){
    h+='<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--brd)">';
    h+='<div class="nrc">'+(n.narasi||'')+'</div>';
    if(n.gambarNarasi) h+='<img src="'+n.gambarNarasi+'" style="max-width:100%;border-radius:6px;margin-top:6px">';
    var related=ST.soal.filter(function(s){return s.narasiId===n.id;});
    if(related.length){
      h+='<div style="margin-top:8px;font-size:10px;color:var(--p);font-weight:600">Soal terkait: ';
      related.forEach(function(s){var idx=ST.soal.indexOf(s);h+='<span style="cursor:pointer;text-decoration:underline;margin-right:4px" onclick="showQ('+idx+')">'+(idx+1)+'</span>';});
      h+='</div>';
    }
    h+='</div>';
  });
  c.innerHTML=h;
}

function highlightNarasi(nid) {
  document.querySelectorAll('.nar-panel>div>div').forEach(function(d){d.style.background='';d.style.borderLeft='';});
  if(!nid)return;
  ST.narasi.forEach(function(n){
    if(n.id===nid){
      var idx=ST.narasi.indexOf(n);
      var panels=document.querySelectorAll('.nar-panel>div>div');
      if(panels[idx]){panels[idx].style.background='rgba(12,140,233,.06)';panels[idx].style.borderLeft='3px solid var(--p)';panels[idx].scrollIntoView({behavior:'smooth',block:'start'});}
    }
  });
}

/* SHOW SOAL */
function showQ(idx) {
  if(idx<0||idx>=ST.soal.length)return;
  ST.curQ=idx;
  var s=ST.soal[idx];
  var ml=s.modelSoal||'Pilihan Ganda';
  var mlDisp=ml;
  if(ml==='Benar Salah')mlDisp=s.tipeBS==='setuju_tidak'?'BS - Setuju/Tidak Setuju':'BS - Benar/Salah';

  var h='<div class="q-model">'+mlDisp+'</div>';
  h+='<div class="q-num">Soal '+(idx+1)+' dari '+ST.soal.length+'</div>';
  h+='<div class="q-text">'+escH(s.soal||'')+'</div>';
  if(s.gambar) h+='<img src="'+s.gambar+'" style="max-width:100%;border-radius:6px;margin-bottom:14px">';

  if(ml==='Benar Salah') h+=buildBSOpts(s);
  else if(ml==='PG Kompleks') h+=buildPGKOpts(s);
  else if(ml==='Kecukupan Data') h+=buildKDOpts(s);
  else h+=buildPGOpts(s);

  document.getElementById('soalPanel').innerHTML=h;
  document.getElementById('soalPanel').scrollTop=0;
  updateNoms();highlightNarasi(s.narasiId);
}

function escH(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/\n/g,'<br>');}

/* PG dengan gambar opsi */
function buildPGOpts(s) {
  /* Baca jumlah opsi dari opsiSoal field */
  var ol=(s.opsiSoal||'A-B-C-D').split('-');
  var cur=ST.jawaban[s.id]||'';
  if(ST.tes.acakOpsi) shuffle_(ol);
  var h='<div class="opts">';
  ol.forEach(function(l){
    var k='opsi'+l, gk='gambar'+l;
    var val=s[k]||'', gval=s[gk]||'';
    var sel=cur===l?' sel':'';
    h+='<div class="opt'+sel+'" onclick="selPG(\''+s.id+'\',\''+l+'\',this)">';
    h+='<input type="radio" name="q_'+s.id+'" value="'+l+'"'+(cur===l?' checked':'')+'>';
    h+='<div class="ol">'+l+'</div>';
    h+='<div class="oc">';
    if(gval) h+='<img class="oi" src="'+gval+'">';
    if(val) h+='<div class="ot">'+escH(val)+'</div>';
    if(!val&&!gval) h+='<div class="ot" style="color:var(--mut);font-style:italic">Opsi kosong</div>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function selPG(sid,val,el) {
  ST.jawaban[sid]=val;
  el.parentElement.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');updateNoms();
}

/* PG Kompleks dengan gambar */
function buildPGKOpts(s) {
  var ol=(s.opsiSoal||'A-B-C-D').split('-');
  if(ST.tes.acakOpsi) shuffle_(ol);
  var cur=ST.jawaban[s.id]||[];
  if(typeof cur==='string'){try{cur=JSON.parse(cur);}catch(e){cur=[];}}
  var h='<p style="font-size:11px;color:var(--wrn);margin-bottom:8px"><i class="fas fa-info-circle"></i> Bisa pilih lebih dari satu jawaban</p><div class="opts">';
  ol.forEach(function(l){
    var k='opsi'+l, gk='gambar'+l;
    var val=s[k]||'', gval=s[gk]||'';
    var sel=cur.indexOf(l)>-1?' sel':'';
    h+='<div class="opt'+sel+'" onclick="selPGK(\''+s.id+'\',\''+l+'\',this)">';
    h+='<input type="checkbox" value="'+l+'"'+(cur.indexOf(l)>-1?' checked':'')+'>';
    h+='<div class="ol">'+l+'</div>';
    h+='<div class="oc">';
    if(gval) h+='<img class="oi" src="'+gval+'">';
    if(val) h+='<div class="ot">'+escH(val)+'</div>';
    if(!val&&!gval) h+='<div class="ot" style="color:var(--mut);font-style:italic">Opsi kosong</div>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function selPGK(sid,val,el) {
  var cur=ST.jawaban[sid]||[];
  if(typeof cur==='string'){try{cur=JSON.parse(cur);}catch(e){cur=[];}}
  var idx=cur.indexOf(val);
  if(idx>-1)cur.splice(idx,1);else cur.push(val);
  ST.jawaban[sid]=cur;el.classList.toggle('sel');updateNoms();
}

/* KD */
function buildKDOpts(s) {
  var cur=ST.jawaban[s.id]||'';
  var h='<div class="opts">';
  ['Cukup','Tidak Cukup'].forEach(function(v){
    var sel=cur===v?' sel':'';
    h+='<div class="opt'+sel+'" onclick="selPG(\''+s.id+'\',\''+v+'\',this)"><input type="radio" name="q_'+s.id+'" value="'+v+'"'+(cur===v?' checked':'')+'><div class="ol"><i class="fas fa-'+(v==='Cukup'?'check':'xmark')+'"></i></div><div class="oc"><div class="ot">'+v+'</div></div></div>';
  });
  h+='</div>';
  return h;
}

/* BS Tabel */
function buildBSOpts(s) {
  var pn=s.pernyataan||[];
  if(!pn.length)return '<p style="color:var(--wrn);font-size:12px">Tidak ada pernyataan</p>';
  var tipe=s.tipeBS||'benar_salah';
  var lA=tipe==='setuju_tidak'?'Setuju':'Benar';
  var lB=tipe==='setuju_tidak'?'Tidak Setuju':'Salah';
  var hdr=tipe==='setuju_tidak'?'Alasan':'Pernyataan';
  var cur=ST.jawaban[s.id]||{};
  if(typeof cur==='string'){try{cur=JSON.parse(cur);}catch(e){cur={};}}

  var h='<table class="bs-tbl"><thead><tr><th>No</th><th>'+hdr+'</th><th style="text-align:center">'+lA+'</th><th style="text-align:center">'+lB+'</th></tr></thead><tbody>';
  pn.forEach(function(p,i){
    var jw=cur[String(i)]||'';
    h+='<tr><td style="font-weight:700;color:var(--p)">'+(i+1)+'</td><td>'+escH(p.text||'')+'</td>';
    h+='<td style="text-align:center"><input type="radio" name="bs_'+s.id+'_'+i+'" value="'+lA+'"'+(jw===lA?' checked':'')+' onchange="selBS(\''+s.id+'\','+i+',\''+lA+'\')"></td>';
    h+='<td style="text-align:center"><input type="radio" name="bs_'+s.id+'_'+i+'" value="'+lB+'"'+(jw===lB?' checked':'')+' onchange="selBS(\''+s.id+'\','+i+',\''+lB+'\')"></td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}

function selBS(sid,idx,val) {
  var cur=ST.jawaban[sid]||{};
  if(typeof cur==='string'){try{cur=JSON.parse(cur);}catch(e){cur={};}}
  cur[String(idx)]=val;ST.jawaban[sid]=cur;updateNoms();
}

/* NAVIGASI */
function goQ(dir){var next=ST.curQ+dir;if(next<0||next>=ST.soal.length)return;showQ(next);}

/* SIMPAN */
async function simpanJwb() {
  try {
    var r=await cG('cekToken',{token:ST.token});
    if(!r.success){alert('Token tidak valid lagi.');submitExam();return;}
    alert('Jawaban tersimpan sementara. Klik "Selesai" untuk mengumpulkan.');
  } catch(e) { alert('Jawaban tersimpan di perangkat (offline). Klik "Selesai" saat koneksi pulih.'); }
}

/* AKHIR */
function akhir() {
  var total=ST.soal.length,dijawab=0;
  ST.soal.forEach(function(_,i){if(isAns_(i))dijawab++;});
  var blm=total-dijawab;
  var msg='Yakin ingin mengumpulkan?\n\nDijawab: '+dijawab+' dari '+total+' soal.';
  if(blm>0)msg+='\n\nPeringatan: '+blm+' soal belum dijawab!';
  if(!confirm(msg))return;
  submitExam();
}

async function submitExam() {
  clearInterval(ST.tInt);
  document.getElementById('examPage').style.display='none';
  document.oncontextmenu=null;document.onkeydown=null;document.onvisibilitychange=null;
  try {
    var r=await cG('submitJawaban',{
      namaSiswa:ST.nama,sekolah:ST.sekolah,kelasSiswa:ST.kelas,
      tesId:ST.tes.id,namaTes:ST.tes.namaTes,mapel:ST.tes.mapel,
      jawaban:ST.jawaban,waktuMulai:ST.mulai,token:ST.token,
      masukSekali:ST.tes.masukSekali,violations:ST.violations
    });
    if(r.success||r.skor!==undefined) showResult(r);
    else {alert('Gagal submit: '+(r.message||''));document.getElementById('examPage').style.display='flex';}
  } catch(e) { showResult(calcLocalScore()); }
}

function calcLocalScore() {
  var total=ST.soal.length,earned=0,benar=0,salah=0;
  ST.soal.forEach(function(s){
    var j=ST.jawaban[s.id];
    if(s.modelSoal==='Benar Salah'&&s.pernyataan&&s.pernyataan.length>0){
      var pt=s.pernyataan.length,cr=0;
      var jObj=typeof j==='string'?JSON.parse(j||'{}'):(j||{});
      s.pernyataan.forEach(function(p,k){if(jObj[String(k)]===p.jawaban)cr++;});
      earned+=cr/pt;if(cr===pt)benar++;else salah++;
    }else{if(j===s.jawaban){earned+=1;benar++;}else{salah++;}}
  });
  return {skor:total>0?Math.round((earned/total)*100):0,benar:benar,salah:salah,totalSoal:total};
}

function showResult(r) {
  document.getElementById('resultPage').style.display='flex';
  document.getElementById('resSub').textContent=ST.tes.namaTes+' - '+ST.kelas;
  document.getElementById('resSkor').textContent=r.skor||0;
  document.getElementById('resTot').textContent=r.totalSoal||ST.soal.length;
  document.getElementById('resBen').textContent=r.benar||0;
  document.getElementById('resSal').textContent=r.salah||0;
}

/* ANTI-CHEAT */
function initAntiCheat() {
  document.oncontextmenu=function(e){e.preventDefault();triggerCheat('Klik kanan terdeteksi');return false;};
  document.onkeydown=function(e){
    if((e.ctrlKey||e.metaKey)&&(e.key==='s'||e.key==='S'||e.key==='p'||e.key==='P')){e.preventDefault();triggerCheat('Shortcut terdeteksi');}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&(e.key==='I'||e.key==='i'||e.key==='J'||e.key==='j'||e.key==='C'||e.key==='c')){e.preventDefault();triggerCheat('DevTools terdeteksi');}
    if(e.key==='F12'){e.preventDefault();triggerCheat('F12 terdeteksi');}
    if(e.key==='PrintScreen'){e.preventDefault();triggerCheat('Screenshot terdeteksi');}
    if(e.key==='Escape'){e.preventDefault();}
    if((e.ctrlKey||e.metaKey)&&(e.key==='a'||e.key==='A'||e.key==='u'||e.key==='U')){e.preventDefault();}
  };
  document.onvisibilitychange=function(){if(document.hidden)triggerCheat('Tab keluar terdeteksi');};
  window.onblur=function(){if(document.getElementById('examPage').style.display!=='none')triggerCheat('Fokus keluar terdeteksi');};
  try{var el=document.documentElement;var rfs=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;if(rfs)rfs.call(el);}catch(e){}
  document.onfullscreenchange=function(){
    if(!document.fullscreenElement&&document.getElementById('examPage').style.display!=='none'){
      triggerCheat('Fullscreen ditutup');
      setTimeout(function(){try{var el2=document.documentElement;var r=el2.requestFullscreen||el2.webkitRequestFullscreen||el2.mozRequestFullScreen||el2.msRequestFullscreen;if(r)r.call(el2);}catch(e){}},5500);
    }
  };
}

var cheatTimeout=null;
function triggerCheat(reason) {
  ST.violations++;
  document.getElementById('exVc').textContent=ST.violations;
  document.getElementById('exVi').classList.add('sh');
  document.getElementById('cheatMsg').textContent=reason+'. Ujian dilanjutkan otomatis.';
  var ov=document.getElementById('cheatOv'),cnt=document.getElementById('cheatCnt');
  ov.classList.add('sh');var sec=5;cnt.textContent=sec;
  if(cheatTimeout)clearInterval(cheatTimeout);
  cheatTimeout=setInterval(function(){
    sec--;cnt.textContent=sec;
    if(sec<=0){clearInterval(cheatTimeout);ov.classList.remove('sh');cheatTimeout=null;}
  },1000);
}

  var params=new URLSearchParams(window.location.search);
  if(params.get('gas')){GAS_URL=params.get('gas');localStorage.setItem('edunexa_gas_url',GAS_URL);}
